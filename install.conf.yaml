- defaults:
    link:
      relink: true
      create: true
    clean:
      force: true

- clean:
    ~/:
    ~/Library/Application Support/Code/User/:
      recursive: true
    ~/.config:
      recursive: true

- shell:
    - command: git submodule update --init --recursive
      description: Installing submodules
    - command: chmod +x ./scripts/*
      description: Making ./scripts executable
    - command: chmod +x ./bin/*
      description: Making ./bin executable

- create:
    - /usr/local/lib/gnubin
    - /usr/local/lib/jvm
    - ~/.config
    - ~/.gem/ruby/
    - ~/.kube
    - ~/.kube/configs
    - ~/.local/bin/
    - ~/.nvm
    - ~/.vim/undo-history
    - ~/projects/github.com
    - ~/projects/gitlab.com

- link:
    # Dotfiles symlink to the home directory directly
    ~/:
      path: etc/.*
      glob: true

    # Local bin symlink for dotfiles executables
    ~/.local/bin/:
      path: bin/*
      glob: true
    ~/.local/bin/dotbot: dotbot/bin/dotbot

    # Shell config
    ~/.zimrc: shell/zsh/.zim/.zimrc
    ~/.zshenv: shell/zsh/.zshenv
    ~/.zshrc: shell/zsh/.zshrc
    ~/.p10k.zsh: shell/zsh/themes/p10k.zsh
    ~/.config/shell/p10k.mise.zsh: shell/zsh/themes/p10k.mise.zsh
    ~/.config/shell/p10k.git-town.zsh: shell/zsh/themes/p10k.git-town.zsh

    # Git config
    ~/.gitignore: git/.gitignore
    ~/.gitconfig.local: git/.gitconfig.local

    # Homebrew
    ~/.Brewfile: os/mac/brew/Brewfile

    # Vim config
    ~/.vimrc: editors/vim/.vimrc

    # Tools that are configured through .config
    ~/.config/direnv/lib: tools/direnv/lib
    ~/.config/atuin/config.toml: tools/atuin/config.toml
    ~/.config/bat/config: tools/bat/config
    ~/.config/btop: tools/btop
    ~/.config/direnv/config.toml: tools/direnv/config.toml
    ~/.config/ghostty/config: tools/ghostty/config
    ~/.config/gitui/theme.ron: tools/gitui/theme.ron
    ~/.config/k9s: tools/k9s
    ~/.config/lsd/config.yaml: tools/lsd/config.yaml
    ~/.config/mise: tools/mise
    ~/.config/pip/pip.conf: langs/python/pip.conf
    ~/.config/procs/config.toml: tools/procs/config.toml
    ~/.config/lazygit/config.yml: tools/lazygit/config.yml

    # GitKraken
    ~/.gitkraken/themes/mocha.jsonc: tools/gitkraken/themes/mocha.jsonc

    # Claude Code
    ~/.claude/settings.json: harnesses/claude/settings.json
    ~/.claude/CLAUDE.md: harnesses/claude/CLAUDE.md

    # Cursor: CLI
    ~/.config/cursor: ~/.cursor
    ~/.cursor/:
      path: harnesses/cursor-cli/*.json
      glob: true
      force: true
    ~/.cursor/hooks: harnesses/cursor-cli/hooks

    # Cursor: Editor
    ~/Library/Application Support/Cursor/User/:
      path: editors/cursor/*.json
      glob: true
      force: true
      if: "[ `uname` = Darwin ]"
    ~/Library/Application Support/Cursor/User/snippets:
      path: editors/cursor/snippets
      force: true
      if: "[ `uname` = Darwin ]"

    # VSCode
    ~/Library/Application Support/Code/User/:
      path: editors/vscode/*.json
      glob: true
      force: true
      if: "[ `uname` = Darwin ]"
    ~/Library/Application Support/Code/User/snippets:
      path: editors/vscode/snippets
      force: true
      if: "[ `uname` = Darwin ]"

    # rtk config in MacOS
    ~/Library/Application Support/rtk/config.toml:
      path: tools/rtk/config.toml
      force: true
      if: "[ `uname` = Darwin ]"

    # Zed
    ~/.config/zed/settings.json:
      path: editors/zed/settings.json
      force: true
    ~/.config/zed/tasks.json:
      path: editors/zed/tasks.json
      force: true

- shell:
    - command: ./scripts/install
      description: Running installers
      stdin: true
      stdout: true
      stderr: true
    - command: ./scripts/configure
      description: Running configurators
      stdin: true
      stdout: true
      stderr: true
    - command: git config --global dotfiles.lastupdate "$(date +%Y-%m-%d-%H:%M)"
      description: Register last update
      stdin: true
      stdout: true
      stderr: true
