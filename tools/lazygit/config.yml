# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
notARepository: "quit"

os:
  editPreset: zed

git:
  parseEmoji: true
  pagers:
    - colorArg: always
      pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  log:
    order: "topo-order"
    showGraph: "always"
    showWholeGraph: false
  allBranchesLogCmds:
    - git log --graph --branches --color=always --abbrev-commit --decorate --date=relative --pretty=medium

customCommands:
  - key: "S"
    context: "global"
    description: "Git Town Sync Stack"
    command: "git town sync --stack --push"
    output: log
    loadingText: "Syncing"
  - key: "a"
    context: "localBranches"
    description: "Git Town Append"
    prompts:
      - type: "input"
        title: "Enter name of new child branch. Branches off of '{{.CheckedOutBranch.Name}}'"
        key: "BranchName"
    command: "git town append {{.Form.BranchName}}"
    output: log
    loadingText: "Appending"
  - key: "h"
    context: "localBranches"
    description: "Git Town Hack (creates a new branch)"
    prompts:
      - type: "input"
        title: "Enter name of new branch. Branches off of 'Main'"
        key: "BranchName"
    command: "git town hack {{.Form.BranchName}}"
    output: log
    loadingText: "Hacking"
  - key: "p"
    context: "localBranches"
    description: "Git Town Propose (creates a pull request)"
    command: "git town propose"
    output: log
    loadingText: "Creating pull request"
  - key: "D"
    context: "localBranches"
    description: "Git Town Delete (deletes the current feature branch and syncs)"
    command: "git town delete"
    prompts:
      - type: "confirm"
        title: "Delete current feature branch"
        body: "Are you sure you want to delete the current feature branch?"
    output: log
    loadingText: "Deleting Feature Branch"
  - key: "G"
    context: "files"
    description: "Git Town GO aka:continue (continue after resolving merge conflicts)"
    command: "git town continue"
    output: log
    loadingText: "Continuing"

gui:
  nerdFontsVersion: "3"
  showIcons: true
  showFileTree: true
  showNumstatInFilesView: true
  showCommandLog: false
  filterMode: fuzzy
  # https://github.com/catppuccin/lazygit/blob/main/themes/mocha/sky.yml
  theme:
    activeBorderColor:
      - "#89dceb"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#89dceb"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
