# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
notARepository: "quit"

os:
  editPreset: zed

git:
  parseEmoji: true
  pagers:
    - colorArg: always
      pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  log:
    order: "topo-order"
    showGraph: "always"
    showWholeGraph: false
  allBranchesLogCmds:
    - git log --graph --branches --color=always --abbrev-commit --decorate --date=relative --pretty=medium

customCommands:
  - key: T
    # NOTE: localBranches is set to overwrite the createTag keybinding
    context: global, localBranches
    description: Git Town Menu
    prompts:
      - type: menu
        title: Git Town
        key: Action
        options:
          - name: Branches
            description: Show branch hierarchy
            value: branch
          - name: Sync Stack
            description: Sync current stack & push
            value: sync --push
          - name: Sync All
            description: Sync all branches & push
            value: sync --all --push
          - name: Append
            description: New child branch off current
            value: append
          - name: Hack
            description: New feature branch off main
            value: hack
          - name: Propose
            description: Create a pull request
            value: propose --non-interactive
          - name: Continue
            description: Continue after conflict
            value: continue
          - name: Undo
            description: Undo last Git Town command
            value: undo
          - name: Delete
            description: Delete current branch
            value: delete
      - type: input
        title: "Enter branch name:"
        key: BranchName
        condition: '{{ or (eq .Form.Action "hack") (eq .Form.Action "append") }}'
    command: "git town {{.Form.Action}} {{.Form.BranchName}}"
    output: log
    loadingText: Git Town

  - key: <c-s>
    context: global
    description: Git Town Sync
    command: git town sync --stack --push
    output: log
    loadingText: Git Town Sync

  - key: <c-b>
    context: global
    description: Git Town Branches
    command: git town branch
    output: popup
    loadingText: Listing branches

  - key: <c-p>
    context: localBranches
    description: Git Town Propose (Interactive)
    command: git town propose
    output: terminal

  - key: H
    context: localBranches
    description: Git Town Hack
    prompts:
      - type: input
        title: "New feature branch name (off main):"
        key: BranchName
    command: "git town hack {{.Form.BranchName}}"
    output: popup

gui:
  nerdFontsVersion: "3"
  showIcons: true
  showFileTree: true
  showNumstatInFilesView: true
  showCommandLog: true
  filterMode: fuzzy
  animateExplosion: true
  enlargedSideViewLocation: top

  # https://github.com/catppuccin/lazygit/blob/main/themes/mocha/sky.yml
  theme:
    activeBorderColor:
      - "#89dceb"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    inactiveViewSelectedLineBgColor:
      - "#6c7086"
    cherryPickedCommitFgColor:
      - "#89dceb"
    cherryPickedCommitBgColor:
      - "#45475a"
    markedBaseCommitFgColor:
      - "#89b4fa"
    markedBaseCommitBgColor:
      - "#f9e2af"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
